<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quant Engine Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/admin/static/css/admin.css" />
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
<div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

<div id="token-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/90 hidden">
  <div class="bg-slate-900 border border-slate-800 rounded-lg p-6 w-full max-w-sm">
    <h2 class="text-lg font-semibold mb-2">Control Token Required</h2>
    <p class="text-sm text-slate-400 mb-4">Enter your x-control-token to access the admin panel.</p>
    <input id="token-input" type="password" class="w-full bg-slate-950 border border-slate-800 rounded px-3 py-2 text-sm text-slate-100 mb-4" placeholder="Control token" />
    <button id="token-save" class="w-full px-3 py-2 rounded text-sm bg-emerald-600 hover:bg-emerald-500 text-white">Continue</button>
  </div>
</div>

<div class="flex min-h-screen">

      <div class="text-xs text-slate-500">Admin Dashboard</div>

        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456zM16.894 20.567L16.5 21.75l-.394-1.183a2.25 2.25 0 00-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 001.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 001.423 1.423l1.183.394-1.183.394a2.25 2.25 0 00-1.423 1.423z"/></svg>
